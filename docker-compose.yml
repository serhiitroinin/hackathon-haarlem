# Local dev Postgres only. Mirrors the DATABASE_URL in .env.example.
# Prod uses Fly Postgres (see DEPLOY.md) — this file is never deployed.
#
#   docker compose up -d     # start
#   pnpm db:push             # create the schema
#   docker compose down      # stop (add -v to wipe data)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haarlem
    ports:
      # Host 5455 (5432/5433 often taken by other local Postgres); container 5432.
      - "5455:5432"
    volumes:
      - haarlem_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d haarlem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  haarlem_pgdata:
